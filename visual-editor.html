<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual & Audio Layer Setup</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .setup-container { display: flex; gap: 20px; padding: 20px; color: white; }
        .preview-box {
            flex: 1; border: 2px dashed #555; position: relative;
            height: 550px; background: #000; overflow: hidden; border-radius: 8px;
        }
        .controls-box {
            width: 460px; background: #2c3e50; padding: 20px; border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); max-height: calc(100vh - 40px); overflow-y: auto;
        }
        .effect-select, .text-input, .text-area {
            width: 100%; padding: 10px; margin: 8px 0 0 0;
            background: #34495e; color: white; border: none; border-radius: 4px; box-sizing: border-box;
        }
        .text-area { min-height: 88px; resize: vertical; }
        button {
            width: 100%; padding: 12px; margin-top: 10px; cursor: pointer; border: none;
            border-radius: 4px; color: white; font-weight: bold; transition: 0.2s;
        }
        button:hover { filter: brightness(1.1); }
        button:disabled { opacity: 0.6; cursor: wait; filter: none; }
        .input-group { margin-bottom: 14px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 14px; }
        .input-group label { font-weight: bold; font-size: 0.95rem; color: #ecf0f1; display: block; }
        .helper-text { margin-top: 6px; font-size: 0.82rem; color: #bdc3c7; line-height: 1.45; }
        .prompt-grid { display: grid; gap: 10px; margin-top: 10px; }
        .status-text { margin-top: 8px; min-height: 18px; font-size: 0.84rem; color: #f1c40f; }
        .preview-tag {
            position: absolute; top: 20px; left: 20px; color: white; background: rgba(0,0,0,0.72);
            padding: 8px 12px; z-index: 10; border-radius: 4px; font-size: 0.85rem;
        }
        .asset-chip {
            display: inline-block; margin-top: 8px; padding: 6px 10px; border-radius: 999px;
            background: rgba(52, 152, 219, 0.2); color: #d6eaf8; font-size: 0.78rem;
        }
    </style>
</head>
<body style="display: block; overflow: auto; background: #1a1a1a; font-family: 'Segoe UI', sans-serif;">
    <div class="setup-container">
        <div class="controls-box">
            <h2>Thiet lap Lop Do hoa & VFX</h2>
            <p id="editing-node-info" style="color: #f39c12; font-weight: bold; margin-bottom: 20px;">Dang sua Node: None</p>

            <div class="input-group" style="border-left: 4px solid #3498db; padding-left: 10px;">
                <label>1. Anh nen courtroom_bg</label>
                <div class="prompt-grid">
                    <input type="file" id="setup-bg" accept="image/*" onchange="handleManualAsset('bg')" class="text-input">
                </div>
                <span id="bg-asset-chip" class="asset-chip" style="display:none;"></span>

                <label style="display:block; margin-top:12px;">Hieu ung VFX nen</label>
                <select id="setup-bg-vfx" class="effect-select" onchange="previewVisuals()">
                    <option value="">Khong co (Binh thuong)</option>
                    <option value="fx-sepia">Hoai niem (Sepia)</option>
                    <option value="fx-grayscale">Trang den (Grayscale)</option>
                    <option value="fx-blur">Mo ao (Blur)</option>
                    <option value="fx-invert">Kinh di (Invert)</option>
                </select>
                <div id="bg-status" class="status-text"></div>
            </div>

            <div class="input-group" style="border-left: 4px solid #9b59b6; padding-left: 10px;">
                <label>2. Anh nhan vat</label>
                <div class="prompt-grid">
                    <input type="file" id="setup-char-img" accept="image/*" onchange="handleManualAsset('char')" class="text-input">
                </div>
                <span id="char-asset-chip" class="asset-chip" style="display:none;"></span>

                <label style="display:block; margin-top:12px;">Hieu ung VFX nhan vat</label>
                <select id="setup-char-vfx" class="effect-select" onchange="previewVisuals()">
                    <option value="">Khong co (Binh thuong)</option>
                    <option value="fx-sepia">Hoai niem (Sepia)</option>
                    <option value="fx-grayscale">Trang den (Grayscale)</option>
                    <option value="fx-blur">Mo ao (Blur)</option>
                    <option value="fx-invert">Kinh di (Invert)</option>
                </select>
                <div id="char-status" class="status-text"></div>
            </div>

            <button onclick="saveAndReturn()" style="background: #27ae60;">Luu thiet lap</button>
            <button onclick="window.location.href='index.html'" style="background: #e74c3c;">Huy bo</button>
        </div>

        <div class="preview-box" id="preview-screen">
            <img id="prev-bg" alt="Background preview" style="width:100%; height:100%; object-fit: cover; position:absolute; top:0; left:0; z-index: 1;">
            <img id="prev-char" alt="Character preview" style="position:absolute; bottom:0; left:50%; transform:translateX(-50%); height:85%; z-index: 3; display:none;">
            <div class="preview-tag">Preview view</div>
        </div>
    </div>

    <script>
        const editingNodeId = localStorage.getItem('editingNodeId');
        const EDITOR_DRAFT_KEY = 'editorDraft';
        const STORY_CACHE_KEY = 'storyData';
        const PENDING_VISUAL_UPDATE_KEY = 'pendingVisualUpdate';
        const STORY_DB_NAME = 'immersiveStoryEngine';
        const STORY_DB_STORE = 'sync';
        let storyData = [];
        let nodeIndex = -1;
        let node = null;
        let activeAssets = {
            bg: { url: '', source: 'empty', prompt: '' },
            char: { url: '', source: 'empty', prompt: '' }
        };

        document.getElementById('editing-node-info').innerText = 'Dang sua Node: ' + (editingNodeId || 'Chua xac dinh');

        initializeEditor();

        // Khoi tao visual editor: nap kich ban, tim node dang sua va do du lieu len form.
        async function initializeEditor() {
            storyData = await loadStoryData();
            nodeIndex = storyData.findIndex((item) => item.id === editingNodeId);
            node = nodeIndex !== -1 ? storyData[nodeIndex] : null;
            initializeFromNode();
        }

        // Nap kich ban tu localStorage truoc, sau do fallback sang story_data.json neu can.
        async function loadStoryData() {
            try {
                const storedStory = JSON.parse(localStorage.getItem(STORY_CACHE_KEY) || '[]');
                if (Array.isArray(storedStory) && storedStory.length > 0) {
                    return storedStory;
                }
            } catch (error) {}

            try {
                if (window.location.protocol !== 'file:') {
                    const response = await fetch('story_data.json', { cache: 'no-store' });
                    if (response.ok) {
                        const fileData = await response.json();
                        const scenes = Array.isArray(fileData) ? fileData : (Array.isArray(fileData.scenes) ? fileData.scenes : []);
                        return scenes;
                    }
                }
            } catch (error) {
                console.warn('Khong the nap story_data.json trong visual editor:', error);
            }

            return [];
        }

        // Do anh, VFX va draft hien co vao preview visual editor.
        function initializeFromNode() {
            if (!node) {
                const editorDraft = loadEditorDraft();
                const draftVisualConfig = editorDraft.visualConfig || {};
                document.getElementById('setup-bg-vfx').value = draftVisualConfig.bgVfx || editorDraft.bgVfx || '';
                document.getElementById('setup-char-vfx').value = draftVisualConfig.charVfx || editorDraft.charVfx || '';

                if (draftVisualConfig.bgUrl) {
                    activeAssets.bg = {
                        url: draftVisualConfig.bgUrl,
                        source: draftVisualConfig.bgSource || 'existing',
                        prompt: ''
                    };
                }

                if (draftVisualConfig.charUrl) {
                    activeAssets.char = {
                        url: draftVisualConfig.charUrl,
                        source: draftVisualConfig.charSource || 'existing',
                        prompt: ''
                    };
                }

                renderAssetChip('bg');
                renderAssetChip('char');
                previewVisuals();
                return;
            }

            const visualConfig = node.visualConfig || {};
            const existingBgUrl = visualConfig.bgUrl || node.background || '';
            const existingCharUrl = visualConfig.charUrl || node.characterSprite || '';

            document.getElementById('setup-bg-vfx').value = visualConfig.bgVfx || '';
            document.getElementById('setup-char-vfx').value = visualConfig.charVfx || '';

            if (existingBgUrl) {
                activeAssets.bg = {
                    url: existingBgUrl,
                    source: visualConfig.bgSource || 'existing',
                    prompt: ''
                };
            }

            if (existingCharUrl) {
                activeAssets.char = {
                    url: existingCharUrl,
                    source: visualConfig.charSource || 'existing',
                    prompt: ''
                };
            }

            renderAssetChip('bg');
            renderAssetChip('char');
            previewVisuals();
        }

        // Hien thi nhan trang thai cho anh nen/anh nhan vat da chon.
        function renderAssetChip(kind) {
            const chip = document.getElementById(kind === 'bg' ? 'bg-asset-chip' : 'char-asset-chip');
            const asset = activeAssets[kind];
            if (!asset.url) {
                chip.style.display = 'none';
                chip.textContent = '';
                return;
            }

            const labelMap = {
                upload: 'Anh upload',
                existing: 'Anh hien co'
            };
            chip.style.display = 'inline-block';
            chip.textContent = labelMap[asset.source] || 'Anh da chon';
        }

        // Cap nhat dong thong bao trang thai cho background hoac character.
        function setStatus(kind, message) {
            document.getElementById(kind === 'bg' ? 'bg-status' : 'char-status').innerText = message || '';
        }

        // Cap nhat khung preview theo anh va VFX dang chon.
        function previewVisuals() {
            const prevBg = document.getElementById('prev-bg');
            const prevChar = document.getElementById('prev-char');
            const bgVfx = document.getElementById('setup-bg-vfx').value;
            const charVfx = document.getElementById('setup-char-vfx').value;

            prevBg.className = bgVfx;
            prevChar.className = charVfx;

            prevBg.src = activeAssets.bg.url || '';
            if (activeAssets.char.url) {
                prevChar.src = activeAssets.char.url;
                prevChar.style.display = 'block';
            } else {
                prevChar.removeAttribute('src');
                prevChar.style.display = 'none';
            }
        }

        // Doc anh nguoi dung upload, chuan hoa neu can va dua vao preview.
        function handleManualAsset(kind) {
            const input = document.getElementById(kind === 'bg' ? 'setup-bg' : 'setup-char-img');
            const file = input.files && input.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async () => {
                try {
                    const normalizedUrl = kind === 'char'
                        ? await convertImageToPngDataUrl(reader.result)
                        : reader.result;

                    activeAssets[kind] = {
                        url: normalizedUrl,
                        source: 'upload',
                        prompt: ''
                    };
                    renderAssetChip(kind);
                    setStatus(kind, kind === 'char' ? 'Da nap avatar PNG vao khung preview.' : 'Da nap anh tai len vao khung preview.');
                    previewVisuals();
                } catch (error) {
                    console.error('Upload normalization error:', error);
                    setStatus(kind, 'Khong xu ly duoc file anh vua tai len.');
                }
            };
            reader.onerror = () => {
                setStatus(kind, 'Khong doc duoc file anh vua tai len.');
            };
            reader.readAsDataURL(file);
        }

        // Tai mot anh vao Image object de canvas co the xu ly.
        function loadImageElement(sourceUrl) {
            return new Promise((resolve, reject) => {
                const image = new Image();
                image.onload = () => resolve(image);
                image.onerror = () => reject(new Error('Khong tai duoc anh de chuyen doi.'));
                image.src = sourceUrl;
            });
        }

        // Chuyen anh nhan vat sang PNG Data URL de luu on dinh trong JSON.
        async function convertImageToPngDataUrl(sourceUrl) {
            const image = await loadImageElement(sourceUrl);
            const canvas = document.createElement('canvas');
            canvas.width = image.naturalWidth || image.width;
            canvas.height = image.naturalHeight || image.height;
            const context = canvas.getContext('2d');
            context.drawImage(image, 0, 0);
            return canvas.toDataURL('image/png');
        }

        // Tao document JSON co scenes va dong bo background/characterSprite tu visualConfig.
        function buildStoryDocument(data) {
            const scenes = data.map((scene) => {
                const visualConfig = scene.visualConfig || {};
                return {
                    ...scene,
                    background: visualConfig.bgUrl || scene.background || '',
                    characterSprite: scene.characterSprite || visualConfig.charUrl || ''
                };
            });

            return { scenes };
        }

        // Doc draft node dang soan tu localStorage.
        function loadEditorDraft() {
            try {
                return JSON.parse(localStorage.getItem(EDITOR_DRAFT_KEY) || 'null') || {};
            } catch (error) {
                return {};
            }
        }

        // Luu draft node dang soan de index co the tiep tuc sau khi quay ve.
        function saveEditorDraft(draft) {
            try {
                localStorage.setItem(EDITOR_DRAFT_KEY, JSON.stringify(draft));
            } catch (error) {
                throw new Error('Anh vua chon qua lon de luu tam trong trinh duyet. Hay mo bang local server va thu lai.');
            }
        }

        // Luu danh sach scene vao localStorage de index va visual editor dong bo.
        function setStoryDataCache(data) {
            try {
                localStorage.setItem(STORY_CACHE_KEY, JSON.stringify(data));
                return true;
            } catch (error) {
                console.warn('Bo qua cache localStorage storyData vi vuot quota:', error);
                try { localStorage.removeItem(STORY_CACHE_KEY); } catch (removeError) {}
                return false;
            }
        }

        // Mo IndexedDB de luu du lieu dong bo lon nhu anh Data URL.
        function openStorySyncDb() {
            return new Promise((resolve, reject) => {
                if (!window.indexedDB) {
                    reject(new Error('IndexedDB khong kha dung.'));
                    return;
                }

                const request = indexedDB.open(STORY_DB_NAME, 1);
                request.onupgradeneeded = () => {
                    request.result.createObjectStore(STORY_DB_STORE);
                };
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        }

        // Ghi mot gia tri dong bo lon vao IndexedDB.
        async function setStorySyncValue(key, value) {
            const db = await openStorySyncDb();
            return new Promise((resolve, reject) => {
                const transaction = db.transaction(STORY_DB_STORE, 'readwrite');
                const request = transaction.objectStore(STORY_DB_STORE).put(value, key);
                request.onsuccess = () => resolve();
                request.onerror = () => reject(request.error);
            });
        }

        // Xoa mot gia tri dong bo trong IndexedDB khi khong con can pending update.
        async function removeStorySyncValue(key) {
            const db = await openStorySyncDb();
            return new Promise((resolve, reject) => {
                const transaction = db.transaction(STORY_DB_STORE, 'readwrite');
                const request = transaction.objectStore(STORY_DB_STORE).delete(key);
                request.onsuccess = () => resolve();
                request.onerror = () => reject(request.error);
            });
        }

        // Luu rieng visual update cua node hien tai khi khong the cache ca kich ban.
        async function savePendingVisualUpdate(nodeId, visualConfig, background, characterSprite) {
            const pendingUpdate = {
                nodeId,
                visualConfig,
                background,
                characterSprite
            };

            try {
                localStorage.setItem(PENDING_VISUAL_UPDATE_KEY, JSON.stringify(pendingUpdate));
            } catch (error) {
                console.warn('Pending visual update vuot localStorage, chuyen sang IndexedDB:', error);
            }

            await setStorySyncValue(PENDING_VISUAL_UPDATE_KEY, pendingUpdate);
        }

        // Goi API local server de ghi truc tiep story_data.json neu khong mo bang file://.
        async function saveStoryDocumentToProject(documentData) {
            if (window.location.protocol === 'file:') {
                return false;
            }

            const response = await fetch('/api/save-story', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(documentData)
            });

            const payload = await response.json().catch(() => ({}));
            if (!response.ok) {
                throw new Error(payload.error || 'Khong ghi duoc story_data.json');
            }

            return payload;
        }

        // Luu thiet lap hinh anh/VFX vao node hoac draft, dong bo cache/file roi quay ve index.
        async function saveAndReturn() {
            try {
                const bgVfx = document.getElementById('setup-bg-vfx').value;
                const charVfx = document.getElementById('setup-char-vfx').value;
                const bgSrc = activeAssets.bg.url || '';
                const charSrc = activeAssets.char.url || '';
                const editorDraft = loadEditorDraft();

                const visualConfig = {
                    bgUrl: bgSrc,
                    bgVfx: bgVfx,
                    bgSource: activeAssets.bg.source,
                    charUrl: charSrc,
                    charVfx: charVfx,
                    charSource: activeAssets.char.source
                };

                if (nodeIndex === -1) {
                    saveEditorDraft({
                        ...editorDraft,
                        id: editingNodeId || editorDraft.id || '',
                        visualConfig: {
                            ...(editorDraft.visualConfig || {}),
                            ...visualConfig
                        },
                        bgVfx: visualConfig.bgVfx || '',
                        charVfx: visualConfig.charVfx || ''
                    });
                    alert('Da luu thiet lap anh cho node dang soan. Du lieu ten, thoai va lien ket giu nguyen o index.');
                    window.location.href = 'index.html';
                    return;
                } else {
                    storyData[nodeIndex].characterSprite = charSrc;
                    storyData[nodeIndex].background = bgSrc;
                    storyData[nodeIndex].visualConfig = {
                        ...(storyData[nodeIndex].visualConfig || {}),
                        ...visualConfig
                    };
                }

                const storyDocument = buildStoryDocument(storyData);
                let savedToProject = false;
                try {
                    savedToProject = await saveStoryDocumentToProject(storyDocument);
                } catch (saveError) {
                    console.warn('Khong ghi truc tiep story_data.json, dung pending visual sync:', saveError);
                }

                if (!savedToProject) {
                    await savePendingVisualUpdate(node.id, visualConfig, bgSrc, charSrc);
                } else {
                    localStorage.removeItem(PENDING_VISUAL_UPDATE_KEY);
                    await removeStorySyncValue(PENDING_VISUAL_UPDATE_KEY).catch(() => {});
                    setStoryDataCache(storyData);
                }

                alert('Da luu thiet lap hinh anh va dong bo sang trinh phat.');
                window.location.href = 'index.html';
            } catch (error) {
                console.error('Loi khi luu du lieu:', error);
                alert('Khong the luu: ' + error.message);
            }
        }

        window.handleManualAsset = handleManualAsset;
        window.previewVisuals = previewVisuals;
        window.saveAndReturn = saveAndReturn;
    </script>
</body>
</html>
