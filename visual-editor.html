<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Visual & Audio Layer Setup</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .setup-container { display: flex; gap: 20px; padding: 20px; color: white; }
        .preview-box { 
            flex: 1; border: 2px dashed #555; position: relative; 
            height: 550px; background: #000; overflow: hidden; border-radius: 8px;
        }
        .controls-box { width: 420px; background: #2c3e50; padding: 20px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .effect-select { width: 100%; padding: 10px; margin: 8px 0 15px 0; background: #34495e; color: white; border: none; border-radius: 4px; }
        button { width: 100%; padding: 12px; margin-top: 10px; cursor: pointer; border: none; border-radius: 4px; color: white; font-weight: bold; transition: 0.2s; }
        button:hover { filter: brightness(1.1); }
        .input-group { margin-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 12px; }
        .input-group label { font-weight: bold; font-size: 0.95rem; color: #ecf0f1; }
    </style>
</head>
<body style="display: block; overflow: auto; background: #1a1a1a; font-family: 'Segoe UI', sans-serif;">
    <div class="setup-container">
        <div class="controls-box">
            <h2>Thiết lập Lớp Đồ Họa & VFX</h2>
            <p id="editing-node-info" style="color: #f39c12; font-weight: bold; margin-bottom: 20px;">Đang sửa Node: None</p>

            <div class="input-group" style="border-left: 4px solid #3498db; padding-left: 10px;">
                <label>1. Ảnh Nền (Background):</label>
                <input type="file" id="setup-bg" accept="image/*" onchange="previewVisuals()" style="margin-top:5px;">
                
                <label style="display:block; margin-top:10px;">Hiệu ứng VFX Nền:</label>
                <select id="setup-bg-vfx" class="effect-select" onchange="previewVisuals()">
                    <option value="">Không có (Bình thường)</option>
                    <option value="fx-sepia">Hoài niệm (Sepia)</option>
                    <option value="fx-grayscale">Trắng đen (Grayscale)</option>
                    <option value="fx-blur">Mờ ảo (Blur)</option>
                    <option value="fx-invert">Kinh dị (Invert)</option>
                </select>
            </div>

            <div class="input-group" style="border-left: 4px solid #9b59b6; padding-left: 10px;">
                <label>2. Ảnh Nhân Vật (Character PNG):</label>
                <input type="file" id="setup-char-img" accept="image/*" onchange="previewVisuals()" style="margin-top:5px;">
                
                <label style="display:block; margin-top:10px;">Hiệu ứng VFX Nhân Vật:</label>
                <select id="setup-char-vfx" class="effect-select" onchange="previewVisuals()">
                    <option value="">Không có (Bình thường)</option>
                    <option value="fx-sepia">Hoài niệm (Sepia)</option>
                    <option value="fx-grayscale">Trắng đen (Grayscale)</option>
                    <option value="fx-blur">Mờ ảo (Blur)</option>
                    <option value="fx-invert">Kinh dị (Invert)</option>
                </select>
            </div>

            <button onclick="saveAndReturn()" style="background: #27ae60;">✅ LƯU THIẾT LẬP TÁCH LỚP</button>
            <button onclick="window.location.href='index.html'" style="background: #e74c3c;">Hủy bỏ</button>
        </div>

        <div class="preview-box" id="preview-screen">
            <img id="prev-bg" style="width:100%; height:100%; object-fit: cover; position:absolute; top:0; left:0; z-index: 1;">
            <img id="prev-char" style="position:absolute; bottom:0; left:50%; transform:translateX(-50%); height:85%; z-index: 3; display:none;">
            
            <div style="position:absolute; top:20px; left:20px; color:white; background:rgba(0,0,0,0.7); padding:8px 12px; z-index: 10; border-radius: 4px; font-size: 0.85rem;">
                👁️ Chế độ Xem trước Tách lớp (Preview View)
            </div>
        </div>
    </div>

    <script>
        let editingNodeId = localStorage.getItem('editingNodeId');
        let storyData = [];
        try {
            storyData = JSON.parse(localStorage.getItem('storyData') || '[]');
        } catch(e) { storyData = []; }

        let nodeIndex = storyData.findIndex(n => n.id === editingNodeId);
        let node = nodeIndex !== -1 ? storyData[nodeIndex] : null;

        document.getElementById('editing-node-info').innerText = "Đang sửa Node: " + (editingNodeId || "Chưa xác định");

        // Khởi tạo hiển thị dựa trên dữ liệu cũ nếu có
        if (node) {
            if (node.visualConfig) {
                document.getElementById('setup-bg-vfx').value = node.visualConfig.bgVfx || "";
                document.getElementById('setup-char-vfx').value = node.visualConfig.charVfx || "";
                if (node.visualConfig.bgUrl) document.getElementById('prev-bg').src = node.visualConfig.bgUrl;
                if (node.visualConfig.charUrl || node.characterSprite) {
                    const charSrc = node.visualConfig.charUrl || node.characterSprite;
                    const prevChar = document.getElementById('prev-char');
                    prevChar.src = charSrc;
                    prevChar.style.display = "block";
                }
                previewVisuals();
            } else if (node.characterSprite) {
                const prevChar = document.getElementById('prev-char');
                prevChar.src = node.characterSprite;
                prevChar.style.display = "block";
            }
        }

        function previewVisuals() {
            const bgVfx = document.getElementById('setup-bg-vfx').value;
            const charVfx = document.getElementById('setup-char-vfx').value;
            
            const bgFile = document.getElementById('setup-bg').files[0];
            const charFile = document.getElementById('setup-char-img').files[0];
            
            const prevBg = document.getElementById('prev-bg');
            const prevChar = document.getElementById('prev-char');

            // Áp dụng class bộ lọc filter trực tiếp lên từng đối tượng hình ảnh
            prevBg.className = bgVfx;
            prevChar.className = charVfx;

            if (bgFile) {
                prevBg.src = URL.createObjectURL(bgFile);
            }
            if (charFile) {
                prevChar.src = URL.createObjectURL(charFile);
                prevChar.style.display = "block";
            }
        }

        function saveAndReturn() {
            try {
                const bgVfx = document.getElementById('setup-bg-vfx').value;
                const charVfx = document.getElementById('setup-char-vfx').value;
                const bgSrc = document.getElementById('prev-bg').src;
                const charSrc = document.getElementById('prev-char').src;

                let bgSrc = document.getElementById('prev-bg').getAttribute('src') || "";
                if (bgSrc === window.location.href) bgSrc = "";

                let charSrc = document.getElementById('prev-char').getAttribute('src') || "";
                if (charSrc === window.location.href) charSrc = "";
                
                if (nodeIndex === -1) {
                    const newNode = {
                        id: editingNodeId,
                        characterName: "Nhân vật mới",
                        dialogueText: "Nội dung trống",
                        nextNode: "end",
                        characterSprite: charSrc,
                        visualConfig: {
                            bgUrl: bgSrc,
                            bgVfx: bgVfx,
                            charUrl: charSrc,
                            charVfx: charVfx
                        }
                    };
                    storyData.push(newNode);
                } else {
                    storyData[nodeIndex].characterSprite = charSrc;
                    storyData[nodeIndex].visualConfig = {
                        bgUrl: bgSrc,
                        bgVfx: bgVfx,
                        charUrl: charSrc,
                        charVfx: charVfx
                    };
                }

                localStorage.setItem('storyData', JSON.stringify(storyData));
                alert("Đã lưu thiết lập hiệu ứng bóc tách thành công!");
                window.location.href = 'index.html';
                
            } catch (err) {
                console.error("Lỗi khi lưu dữ liệu:", err);
                alert("Không thể lưu: " + err.message);
            }
        }
    </script>
</body>
</html>
